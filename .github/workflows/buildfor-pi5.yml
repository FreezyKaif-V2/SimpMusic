name: Build SimpMusic for Raspberry Pi 5 (ARM64)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pi:
    name: Build Linux ARM64 AppImage
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: "microsoft"
          cache: 'gradle'

      - name: Install 7-Zip 24.x + libfuse2
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2
          curl -fsSL https://github.com/ip7z/7zip/releases/download/26.01/7z2601-linux-x64.tar.xz -o /tmp/7zz.tar.xz
          sudo tar -xf /tmp/7zz.tar.xz -C /usr/local/bin/ 7zz
          sudo ln -sf /usr/local/bin/7zz /usr/local/bin/7z

      - name: Update build product flavor & Sentry
        run: |
          echo "" >> ./gradle.properties
          echo "isFullBuild=true" >> ./gradle.properties
          echo 'SENTRY_DSN=${{ secrets.SENTRY_DSN_JVM }}' > ./local.properties
          echo "SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}" >> ./local.properties

      - name: Generate aboutLibraries & vlc-natives
        run: |
          ./gradlew exportLibraryDefinitions
          ./gradlew :composeApp:vlcSetupAll --no-configuration-cache

      - name: Generate Conveyor config
        run: ./gradlew :desktopApp:writeConveyorConfig --no-configuration-cache

      - name: Run Conveyor (Linux ARM64)
        uses: hydraulic-software/conveyor/actions/build@v22.0
        with:
          command: -Kapp.machines=linux.aarch64.glibc make linux-app
          agree_to_license: 1
          signing_key: ${{ secrets.CONVEYOR_SIGNING_KEY || 'generate' }}

      - name: Download and Setup x86_64 AppImageTool
        run: |
          # We MUST download the x86_64 version because the GitHub runner is x86_64
          wget https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O /tmp/appimagetool
          chmod +x /tmp/appimagetool
          cd /tmp
          # Extract it to avoid FUSE issues in CI
          ./appimagetool --appimage-extract
          sudo mv squashfs-root /opt/appimagetool.AppDir
          sudo ln -s /opt/appimagetool.AppDir/AppRun /usr/local/bin/appimagetool

      - name: Manually Wrap Conveyor output → ARM64 AppImage
        env:
          ARCH: aarch64
        run: |
          echo "Checking what Conveyor actually named the folder:"
          ls -lh output/
          
          # Dynamically find the output directory, ignoring upper/lowercase differences
          APP_DIR=$(find output -maxdepth 1 -type d -iname "*linux*aarch64*" | head -n 1)
          
          if [ -z "$APP_DIR" ]; then
            echo "Error: Could not find the Linux ARM64 output directory."
            exit 1
          fi
          
          echo "Successfully found folder: $APP_DIR"
          
          # Run the x86_64 tool on the found directory to generate the ARM64 AppImage
          appimagetool "$APP_DIR" output/SimpMusic-RaspberryPi5-aarch64.AppImage

      - name: Upload Pi AppImage
        uses: actions/upload-artifact@v4
        with:
          name: simpmusic-pi5-arm64
          path: output/SimpMusic-RaspberryPi5-aarch64.AppImage
