name: Build SimpMusic for Raspberry Pi 5 (ARM64)

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-pi:
    name: Build Linux ARM64 AppImage
    runs-on: ubuntu-22.04
    defaults:
      run:
        shell: bash
    steps:
      - uses: actions/checkout@v6
        with:
          submodules: 'recursive'

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: "microsoft"
          cache: 'gradle'

      - name: Install 7-Zip 24.x + libfuse2
        run: |
          sudo apt-get update
          sudo apt-get install -y libfuse2
          curl -fsSL https://github.com/ip7z/7zip/releases/download/26.01/7z2601-linux-x64.tar.xz -o /tmp/7zz.tar.xz
          sudo tar -xf /tmp/7zz.tar.xz -C /usr/local/bin/ 7zz
          sudo ln -sf /usr/local/bin/7zz /usr/local/bin/7z

      - name: Update build product flavor & Sentry
        run: |
          echo "" >> ./gradle.properties
          echo "isFullBuild=true" >> ./gradle.properties
          echo 'SENTRY_DSN=${{ secrets.SENTRY_DSN_JVM }}' > ./local.properties
          echo "SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}" >> ./local.properties

      - name: Generate aboutLibraries & vlc-natives
        run: |
          ./gradlew exportLibraryDefinitions
          ./gradlew :composeApp:vlcSetupAll --no-configuration-cache

      - name: Generate Conveyor config
        run: ./gradlew :desktopApp:writeConveyorConfig --no-configuration-cache

      - name: Run Conveyor (Linux ARM64)
        uses: hydraulic-software/conveyor/actions/build@v22.0
        with:
          command: -Kapp.machines=linux.aarch64.glibc make linux-app
          agree_to_license: 1
          signing_key: ${{ secrets.CONVEYOR_SIGNING_KEY || 'generate' }}

      - name: Build AppDir and Initial AppImage via Gradle
        # This does the heavy lifting: creates the .desktop file, icons, and AppDir.
        # It creates an x86_64 wrapper, but the binaries inside are still aarch64.
        run: ./gradlew :desktopApp:packageConveyorAppImage --no-configuration-cache

      - name: Repackage AppImage for ARM64
        env:
          ARCH: aarch64
        run: |
          # 1. Download x86_64 AppImageTool to act as our repackager
          wget https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage -O appimagetool
          chmod +x appimagetool
          ./appimagetool --appimage-extract
          mv squashfs-root appimagetool-dir
          
          # 2. Find and extract the AppImage Gradle just built to get the perfect AppDir folder
          WRONG_APPIMAGE=$(find desktopApp/build/appimage/conveyor/ -name "SimpMusic-*.AppImage" | head -1)
          chmod +x "$WRONG_APPIMAGE"
          "$WRONG_APPIMAGE" --appimage-extract
          
          # 3. Repackage the extracted AppDir (squashfs-root) into a true ARM64 AppImage
          mkdir -p output/
          ./appimagetool-dir/AppRun squashfs-root output/SimpMusic-RaspberryPi5-aarch64.AppImage
          
      - name: Upload Pi AppImage
        uses: actions/upload-artifact@v4
        with:
          name: simpmusic-pi5-arm64
          path: output/SimpMusic-RaspberryPi5-aarch64.AppImage
